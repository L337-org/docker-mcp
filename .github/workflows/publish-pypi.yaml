name: 'Publish to PyPI'

# Publishes the sdist + wheel to PyPI on each GitHub Release, via PyPI Trusted Publishing (OIDC) —
# no stored API token. The pending/registered trusted publisher on PyPI must match this workflow:
# owner GavinLucas, repository docker-mcp, workflow filename publish-pypi.yaml. Kept in its own
# workflow (like publish-images.yaml) so it never shows as a skipped check on pull requests.

permissions:
  contents: read

on:
  release:
    types: [published]

jobs:

  publish:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # required for Trusted Publishing (OIDC)
    steps:
      - name: Check out source repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Build sdist and wheel
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
