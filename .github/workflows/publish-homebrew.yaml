name: 'Publish Homebrew formula'

# On each GitHub Release: downloads pre-built macOS wheels for arm64 and x86_64 from PyPI (using
# the frozen lockfile so versions are pinned), packages each set into a wheelhouse tarball, attaches
# both to the release, then pushes an updated Formula/docker-mcp-server.rb to GavinLucas/homebrew-tap.
#
# Runs on ubuntu-latest. Both wheelhouses are built via cross-platform pip downloads:
#   arm64:   --platform macosx_<floor>_arm64  +  --platform macosx_<floor>_universal2
#   x86_64:  --platform macosx_<floor>_x86_64  +  --platform macosx_<floor>_universal2
# The floor is Homebrew's minimum supported macOS, discovered at runtime by querying the
# Homebrew formulae API (oldest Intel bottle of a core formula → version number). pip's
# backwards-compatible tag expansion means a higher floor still covers all wheels with older
# macOS minimums (10.x, 11.x, 12.x, ...).
# The universal2 flag is required alongside each arch because some packages (bcrypt, cryptography,
# pynacl) publish macOS wheels only as universal2 fat binaries; pip does not fold universal2 into
# the arch-specific tag expansion automatically.
# --python-version is derived from requires-python in pyproject.toml so it tracks Python bumps.
# The codename→version map in "Resolve macOS floor" needs a new entry when Apple announces a new
# macOS release (well before it could become Homebrew's minimum); the floor itself self-updates.
#
# Homebrew's install sandbox has no network access, so all dependencies must ship inside the tarball.
# `--only-binary :all:` fails loudly if any locked dep lacks a macOS binary wheel — that is the
# guardrail; do not remove it.
#
# Requires the repository secret TAP_GITHUB_TOKEN: a fine-grained PAT with Contents read+write on
# GavinLucas/homebrew-tap. Create it at github.com/settings/tokens and add it as a secret on this
# repo under Settings → Secrets → Actions.
#
# workflow_dispatch lets you backfill a release that predates this workflow (supply the tag, e.g.
# v1.9.2). The release must already exist and docker-mcp-server must be live on PyPI for that version.

permissions:
  contents: read

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to build wheelhouses for (e.g. v1.9.2)'
        required: true

jobs:

  publish:
    name: Build wheelhouses and push formula
    runs-on: ubuntu-latest
    if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write  # upload wheelhouse tarballs to the release
    steps:
      - name: Check out source repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.release.tag_name || github.event.inputs.tag }}

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Resolve version, Python target, and macOS floor
        run: |
          set -euo pipefail
          TAG="${{ github.event.release.tag_name || github.event.inputs.tag }}"
          echo "TAG=$TAG" >> "$GITHUB_ENV"
          echo "VERSION=${TAG#v}" >> "$GITHUB_ENV"

          PYTHON_VER=$(python3 -c "
          import tomllib, re
          d = tomllib.load(open('pyproject.toml', 'rb'))
          print(re.search(r'[\d.]+', d['project']['requires-python']).group())
          ")
          echo "PYTHON_VER=$PYTHON_VER" >> "$GITHUB_ENV"

          # Discover Homebrew's minimum supported macOS from their formulae API.
          # Add a new entry to VERSIONS when Apple announces a new macOS release.
          MACOS_FLOOR=$(python3 -c "
          import json, sys, urllib.request
          VERSIONS = {'monterey': 12, 'ventura': 13, 'sonoma': 14, 'sequoia': 15, 'tahoe': 16}
          try:
              data = json.loads(urllib.request.urlopen(
                  'https://formulae.brew.sh/api/formula/curl.json', timeout=15).read())
              intel = sorted(k for k in data['bottle']['stable']['files']
                             if not k.startswith('arm64_') and 'linux' not in k)
              codename = intel[0]
              ver = VERSIONS.get(codename)
              if ver is None:
                  print(f'Unknown macOS codename {codename!r} — add it to VERSIONS', file=sys.stderr)
                  sys.exit(1)
              print(f'{ver}_0')
          except SystemExit:
              raise
          except Exception as e:
              print(f'Failed to resolve Homebrew macOS floor: {e}', file=sys.stderr)
              sys.exit(1)
          ")
          echo "MACOS_FLOOR=$MACOS_FLOOR" >> "$GITHUB_ENV"
          echo "Python target: $PYTHON_VER  |  macOS floor: $MACOS_FLOOR" >> "$GITHUB_STEP_SUMMARY"

      - name: Export locked dependencies
        # --no-emit-project excludes docker-mcp-server itself (downloaded separately below so we
        # get the published PyPI wheel rather than a local build).
        # --no-hashes keeps the requirements file simple; wheel integrity is enforced by sha256sum.
        run: uv export --frozen --no-dev --no-emit-project --no-hashes -o /tmp/requirements.txt

      - name: Download macOS arm64 wheelhouse
        # See top-of-file comment for the --platform rationale.
        run: |
          set -euo pipefail
          mkdir wheelhouse-arm64
          python3 -m pip download \
            --no-deps \
            --platform "macosx_${MACOS_FLOOR}_arm64" \
            --platform "macosx_${MACOS_FLOOR}_universal2" \
            --python-version "$PYTHON_VER" \
            --implementation cp \
            --only-binary :all: \
            -r /tmp/requirements.txt \
            -d wheelhouse-arm64
          # docker-mcp-server is a pure-python wheel (py3-none-any); platform-independent but must
          # be present in each wheelhouse for the offline install to work.
          # Retry loop: publish-homebrew and publish-pypi both fire on release.published with no
          # ordering guarantee, so the wheel may not yet be on PyPI when this step starts.
          downloaded=false
          for attempt in 1 2 3 4 5; do
            if python3 -m pip download \
                --no-deps \
                --platform "macosx_${MACOS_FLOOR}_arm64" \
                --platform "macosx_${MACOS_FLOOR}_universal2" \
                --python-version "$PYTHON_VER" \
                --implementation cp \
                --only-binary :all: \
                "docker-mcp-server==${{ env.VERSION }}" \
                -d wheelhouse-arm64; then
              downloaded=true; break
            fi
            [ "$attempt" -lt 5 ] && { echo "Attempt $attempt/5 failed; retrying in 30 s..."; sleep 30; }
          done
          $downloaded || { echo "docker-mcp-server wheel not available after 5 attempts"; exit 1; }

      - name: Download macOS x86_64 wheelhouse
        # See top-of-file comment for the --platform rationale.
        run: |
          set -euo pipefail
          mkdir wheelhouse-x86_64
          python3 -m pip download \
            --no-deps \
            --platform "macosx_${MACOS_FLOOR}_x86_64" \
            --platform "macosx_${MACOS_FLOOR}_universal2" \
            --python-version "$PYTHON_VER" \
            --implementation cp \
            --only-binary :all: \
            -r /tmp/requirements.txt \
            -d wheelhouse-x86_64
          downloaded=false
          for attempt in 1 2 3 4 5; do
            if python3 -m pip download \
                --no-deps \
                --platform "macosx_${MACOS_FLOOR}_x86_64" \
                --platform "macosx_${MACOS_FLOOR}_universal2" \
                --python-version "$PYTHON_VER" \
                --implementation cp \
                --only-binary :all: \
                "docker-mcp-server==${{ env.VERSION }}" \
                -d wheelhouse-x86_64; then
              downloaded=true; break
            fi
            [ "$attempt" -lt 5 ] && { echo "Attempt $attempt/5 failed; retrying in 30 s..."; sleep 30; }
          done
          $downloaded || { echo "docker-mcp-server wheel not available after 5 attempts"; exit 1; }

      - name: Package wheelhouses and compute SHA-256 hashes
        run: |
          set -euo pipefail
          ARM64="docker-mcp-server-${{ env.VERSION }}-wheelhouse-macos-arm64.tar.gz"
          X86_64="docker-mcp-server-${{ env.VERSION }}-wheelhouse-macos-x86_64.tar.gz"
          (cd wheelhouse-arm64  && tar czf "../$ARM64"  .)
          (cd wheelhouse-x86_64 && tar czf "../$X86_64" .)
          SHA_ARM64=$(sha256sum "$ARM64"  | awk '{print $1}')
          SHA_X86_64=$(sha256sum "$X86_64" | awk '{print $1}')
          echo "SHA_ARM64=$SHA_ARM64"   >> "$GITHUB_ENV"
          echo "SHA_X86_64=$SHA_X86_64" >> "$GITHUB_ENV"
          echo "arm64  sha256: \`$SHA_ARM64\`"  >> "$GITHUB_STEP_SUMMARY"
          echo "x86_64 sha256: \`$SHA_X86_64\`" >> "$GITHUB_STEP_SUMMARY"

      - name: Attach wheelhouses to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release upload "${{ env.TAG }}" \
            "docker-mcp-server-${{ env.VERSION }}-wheelhouse-macos-arm64.tar.gz" \
            "docker-mcp-server-${{ env.VERSION }}-wheelhouse-macos-x86_64.tar.gz" \
            --clobber

      - name: Push updated formula to homebrew-tap
        env:
          GH_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git clone "https://x-access-token:${GH_TOKEN}@github.com/GavinLucas/homebrew-tap.git" tap
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          mkdir -p Formula
          sed \
            -e "s|\${VERSION}|${VERSION}|g" \
            -e "s|\${TAG}|${TAG}|g" \
            -e "s|\${SHA_ARM64}|${SHA_ARM64}|g" \
            -e "s|\${SHA_X86_64}|${SHA_X86_64}|g" \
            "$GITHUB_WORKSPACE/scripts/docker-mcp-server.rb.tpl" \
            > Formula/docker-mcp-server.rb
          git add Formula/docker-mcp-server.rb
          if git diff --cached --quiet; then
            echo "Formula unchanged for $VERSION; nothing to push." >> "$GITHUB_STEP_SUMMARY"
          else
            git commit -m "docker-mcp-server $VERSION"
            git push
          fi
