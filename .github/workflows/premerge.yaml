name: 'Check inbound changes'
permissions:
  contents: read

# Triggers. `push` is scoped to main only — PR branches are already covered by the
# `pull_request` trigger, so an unscoped `push` would double-run CI for every branch
# that has an open PR.
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Cancel superseded runs on the same ref (e.g. rapid pushes to a PR branch); a push to main
# gets its own ref group so PR runs never cancel main's. Same shape codeql.yaml uses.
concurrency:
  group: premerge-${{ github.ref }}
  cancel-in-progress: true

# Jobs
jobs:

  pytest-run:
    runs-on: [ubuntu-latest]
    name: Run pytest
    steps:
      - name: Check out source repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python environment
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.14"

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Install dependencies
        # --locked fails if uv.lock disagrees with pyproject.toml instead of silently
        # re-locking — catches a lockfile-only dependency change (e.g. a Dependabot lock
        # rewrite that raises a cap pyproject still pins) that would otherwise pass CI.
        run: uv sync --all-groups --locked

      - name: Run pytest
        run: uv run pytest -v

  ruff-run:
    # Runs ruff lint + format checks. `uv run` (not `uvx`) so the ruff version is the
    # dev-group pin resolved through uv.lock — the same version pre-commit hooks run
    # locally — rather than a floating latest that can disagree with both.

    runs-on: [ubuntu-latest]

    name: Run ruff
    steps:
      - name: Check out source repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python environment
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.14"

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Install dependencies
        # --locked fails if uv.lock disagrees with pyproject.toml instead of silently
        # re-locking — catches a lockfile-only dependency change (e.g. a Dependabot lock
        # rewrite that raises a cap pyproject still pins) that would otherwise pass CI.
        run: uv sync --all-groups --locked

      - name: Run ruff lint
        run: uv run ruff check .

      - name: Run ruff format check
        run: uv run ruff format --check .

  pyright-run:
    # Type-checks with the pyright pin from the dev group ([tool.pyright] config in
    # pyproject.toml). Documented as a project convention; this job enforces it.
    runs-on: [ubuntu-latest]
    name: Run pyright
    steps:
      - name: Check out source repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python environment
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.14"

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Install dependencies
        # --locked fails if uv.lock disagrees with pyproject.toml instead of silently
        # re-locking — catches a lockfile-only dependency change (e.g. a Dependabot lock
        # rewrite that raises a cap pyproject still pins) that would otherwise pass CI.
        run: uv sync --all-groups --locked

      - name: Run pyright
        run: uv run pyright

  mirror-check:
    # CLAUDE.md and .github/copilot-instructions.md are mirrors (see the MIRROR RULE in
    # CLAUDE.md); this flags a PR that edits one without the other. Deliberately NOT a
    # required check — a one-sided edit can be legitimate (typo, wording) — so a red X
    # here is a prompt to double-check, not a merge blocker. Fork-safe: read-only, no
    # secrets, plain git diff (a PR-comment approach would need pull-requests:write,
    # which fork PRs don't get).
    runs-on: [ubuntu-latest]
    name: Check docs mirror
    if: github.event_name == 'pull_request'
    steps:
      - name: Check out source repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0  # need the merge-base with the PR base branch

      - name: Compare CLAUDE.md and copilot-instructions.md changes
        run: |
          base="$(git merge-base "origin/${GITHUB_BASE_REF}" HEAD)"
          changed="$(git diff --name-only "$base" HEAD)"
          c=$(grep -cx 'CLAUDE.md' <<<"$changed" || true)
          g=$(grep -cx '.github/copilot-instructions.md' <<<"$changed" || true)
          if [ "$c" != "$g" ]; then
            echo "::error::MIRROR RULE: this PR changes one of CLAUDE.md / .github/copilot-instructions.md but not the other. If the change is architectural, mirror it; if it's a legitimate one-sided edit (typo/wording), this warning can be ignored — the check is not required for merge."
            exit 1
          fi
          echo "Docs mirror OK (both changed: $c)"

  integration-tests:
    # Runs the suite gated by `-m integration` against the Docker daemon that
    # ships pre-installed on ubuntu-latest runners. Skipped if the unit tests
    # didn't pass — there's no point burning daemon time on a broken branch.
    runs-on: [ubuntu-latest]
    name: Run integration tests
    needs: [pytest-run]
    timeout-minutes: 20
    # The Hub-login step below gates on `env.DOCKERHUB_TOKEN`, which means the env
    # var needs to be resolved by the time the step `if:` is evaluated. Step-scoped
    # `env:` is set up too late for that, so we hoist the values to job-level env
    # (which IS resolved before any step `if:` runs). Referencing `secrets.*`
    # directly in the step `if:` is rejected at workflow-validation time with
    # "Unrecognized named-value: 'secrets'", so this hoist is the only working
    # shape for an opt-in-via-secret gate.
    env:
      DOCKERHUB_USER: ${{ secrets.DOCKERHUB_USER }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
    steps:
      - name: Check out source repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python environment
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.14"

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Install dependencies
        # --locked fails if uv.lock disagrees with pyproject.toml instead of silently
        # re-locking — catches a lockfile-only dependency change (e.g. a Dependabot lock
        # rewrite that raises a cap pyproject still pins) that would otherwise pass CI.
        run: uv sync --all-groups --locked

      - name: Verify Docker tooling on the runner
        # ubuntu-latest ships Docker Engine + docker CLI + compose v2 + buildx.
        # Scout is NOT pre-installed; tests skip cleanly via has_plugin().
        run: |
          docker version
          docker info | head -20
          docker compose version
          docker buildx version
          docker scout version 2>/dev/null || echo "scout not installed; scout integration tests will skip"

      - name: Initialize a single-node swarm
        # Needed for service_wait / node_wait integration tests (skip_if_no_swarm), which
        # otherwise skip cleanly on a non-swarm daemon. No teardown needed — the runner is
        # ephemeral and torn down after the job.
        run: docker swarm init

      - name: Optional Docker Hub login to dodge anonymous rate limits
        # Opt-in: set DOCKERHUB_USER / DOCKERHUB_TOKEN as repo secrets to authenticate.
        # Without them, the job runs anonymous and the existing skip-on-pull-failure
        # behaviour in the compose lifecycle test catches throttling.
        #
        # This `docker login` authenticates the *daemon/CLI*-backed tests (compose pulls,
        # etc.) by writing ~/.docker/config.json. It does NOT cover the registry HTTP tools
        # (registry_*), which hit registry-1.docker.io over httpx and authenticate only via
        # explicit args or the DOCKER_MCP_SERVER_REGISTRY_* env vars below — they never read
        # config.json. Both mechanisms are needed; don't drop one as redundant.
        if: ${{ env.DOCKERHUB_TOKEN != '' && env.DOCKERHUB_USER != '' }}
        run: echo "$DOCKERHUB_TOKEN" | docker login --username "$DOCKERHUB_USER" --password-stdin

      - name: Run integration tests
        # Authenticate the httpx-backed registry_* tools so their alpine manifest/config tests
        # don't 429 on Docker Hub's anonymous ~100-pull/6h-per-IP cap (CI runners share an
        # egress IP). The registry tools read these env vars (registry.py:_env_credentials);
        # unset (e.g. fork PRs, which get no secrets) → anonymous, and the skip-on-429 in
        # test_registry.py is the safety net.
        env:
          DOCKER_MCP_SERVER_REGISTRY_USERNAME: ${{ secrets.DOCKERHUB_USER }}
          DOCKER_MCP_SERVER_REGISTRY_PASSWORD: ${{ secrets.DOCKERHUB_TOKEN }}
        run: uv run pytest -m integration -v --tb=short
