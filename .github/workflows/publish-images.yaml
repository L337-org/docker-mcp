name: 'Publish container images'

# Publishes the container images on each GitHub Release. Kept in its own workflow (rather than
# a release-gated job inside images.yaml) so it never shows up as a skipped check on pull requests.
#   full     -> docker-mcp-server:latest    + :<version>
#   no-scout -> docker-mcp-server:no-scout   + :<version>-no-scout
# where <version> is the release tag with any leading "v" stripped.
#
# Images go to GHCR (ghcr.io/gavinlucas/docker-mcp-server) always, and are mirrored to Docker Hub
# (docker.io/gavinlucas/docker-mcp-server) when the DOCKERHUB_USER / DOCKERHUB_TOKEN repo secrets are
# set. The Docker Hub mirror is opt-in: with the secrets unset the Hub login/tags/description steps are
# skipped and only GHCR is pushed, so a release never fails for lack of Hub credentials. The Hub token
# must have read/write/delete scope (the description-sync API rejects a read/write-only token with 403).

permissions:
  contents: read

on:
  release:
    types: [published]

jobs:

  publish:
    name: Publish ${{ matrix.variant }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    # Hoisted to job-level env so the step `if:` (resolved before step-scoped env exists) can gate the
    # Docker Hub steps on whether the secrets are present. Referencing `secrets.*` in a step `if:`
    # directly is rejected at workflow-validation time, so this hoist is the only working shape.
    env:
      DOCKERHUB_USER: ${{ secrets.DOCKERHUB_USER }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: full
            install_cli: '1'
            install_scout: '1'
            disable_domains: ''
          - variant: no-scout
            install_cli: '1'
            install_scout: '0'
            disable_domains: 'scout'
    steps:
      - name: Check out source repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Compute image tags
        id: meta
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          version="${RELEASE_TAG#v}"
          # GHCR always; mirror to Docker Hub only when the credentials are present (see header).
          registries="ghcr.io/gavinlucas/docker-mcp-server"
          if [ -n "$DOCKERHUB_USER" ] && [ -n "$DOCKERHUB_TOKEN" ]; then
            registries="$registries docker.io/gavinlucas/docker-mcp-server"
          fi
          tags=""
          for img in $registries; do
            if [ "${{ matrix.variant }}" = "full" ]; then
              tags="$tags,$img:latest,$img:$version"
            else
              tags="$tags,$img:no-scout,$img:$version-no-scout"
            fi
          done
          tags="${tags#,}"
          echo "tags=$tags" >> "$GITHUB_OUTPUT"
          echo "Publishing \`${{ matrix.variant }}\` as: $tags" >> "$GITHUB_STEP_SUMMARY"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0
        with:
          # The two matrix jobs race to cache the same binfmt image; skip the cache to avoid the
          # harmless "unable to reserve cache" warning while keeping both builds parallel.
          cache-image: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: env.DOCKERHUB_USER != '' && env.DOCKERHUB_TOKEN != ''
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          username: ${{ secrets.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push ${{ matrix.variant }}
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          # image.source links the GHCR package to this repo (visibility + "connected repository").
          labels: |
            org.opencontainers.image.source=https://github.com/GavinLucas/docker-mcp
            org.opencontainers.image.version=${{ github.event.release.tag_name }}
          build-args: |
            INSTALL_CLI=${{ matrix.install_cli }}
            INSTALL_SCOUT=${{ matrix.install_scout }}
            DISABLE_DOMAINS=${{ matrix.disable_domains }}

  dockerhub-description:
    # Sync DOCKERHUB.md (a slim, container-focused readme — the full README.md exceeds Hub's 25 KB cap)
    # onto the Docker Hub repository's description page (the point of the Hub mirror is discoverability).
    # Runs once per release after the images are pushed, and is opt-in like the mirror: both steps are
    # gated on the DOCKERHUB_* secrets, so nothing runs when they're unset.
    name: Sync Docker Hub description
    runs-on: ubuntu-latest
    needs: [publish]
    env:
      DOCKERHUB_USER: ${{ secrets.DOCKERHUB_USER }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
    steps:
      - name: Check out source repository
        if: env.DOCKERHUB_USER != '' && env.DOCKERHUB_TOKEN != ''
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Update Docker Hub description
        if: env.DOCKERHUB_USER != '' && env.DOCKERHUB_TOKEN != ''
        uses: peter-evans/dockerhub-description@1b9a80c056b620d92cedb9d9b5a223409c68ddfa # v5.0.0
        with:
          username: ${{ secrets.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: gavinlucas/docker-mcp-server
          # Dedicated, container-focused readme — the full README.md exceeds Docker Hub's 25,000-byte cap.
          readme-filepath: ./DOCKERHUB.md
          short-description: "MCP server exposing the Docker SDK for Python and docker CLI as tools for AI agents"
