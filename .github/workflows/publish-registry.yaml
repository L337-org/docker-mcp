name: 'Publish to MCP Registry'

# Publishes server.json to the official MCP Registry (registry.modelcontextprotocol.io) on each
# GitHub Release. The registry stores only metadata — it points at artifacts the OTHER release
# workflows publish — so this is a thin, late step layered on top of them.
#
# Ownership verification: the registry checks that we own each package listed in server.json, via a
# marker that must equal server.json's `name` (io.github.GavinLucas/docker-mcp-server):
#   - pypi  -> the `<!-- mcp-name: ... -->` comment in README.md (PyPI long-description)
#   - oci   -> the io.modelcontextprotocol.server.name image label (set in publish-images.yaml)
#   - mcpb  -> the .mcpb release-asset URL (must contain "mcp") + a matching fileSha256
# All three markers therefore have to be live in the SAME release for a publish to succeed, so this
# workflow can only go green once the PyPI, image, and .mcpb publish workflows have all shipped that
# release's artifacts. Authentication is GitHub OIDC (no stored secret) — the id-token permission
# lets mcp-publisher prove the io.github.GavinLucas namespace from the workflow's OIDC token.
#
# This runs in parallel with the sibling publish workflows on the same release event, so it races
# them — notably the slow multi-arch image build whose label the registry verifies. The publish step
# therefore retries on a *propagation* failure (a verified artifact "does not exist" yet) for long
# enough to outlast that build, and fails fast only on a *deterministic* rejection (an invalid
# server.json field, or a namespace-permission error) where retrying can't help. If it still loses
# the race, re-run it by hand (workflow_dispatch) once the release's other assets are present.

permissions:
  contents: read

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to publish (e.g. v1.8.0)'
        required: true

jobs:

  publish:
    name: Publish server.json
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # required for MCP Registry GitHub OIDC authentication
    steps:
      - name: Check out source repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Stamp version + .mcpb hash into server.json
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          INPUT_TAG: ${{ github.event.inputs.tag }}
        run: |
          set -euo pipefail
          tag="${RELEASE_TAG:-$INPUT_TAG}"
          version="${tag#v}"
          # Fetch the exact published .mcpb to hash it (clients validate this fileSha256 on install),
          # retrying since publish-mcpb.yaml may still be attaching it when this workflow starts.
          mkdir -p _mcpb
          for i in $(seq 1 10); do
            if gh release download "$tag" --repo "$GITHUB_REPOSITORY" --pattern '*.mcpb' --dir _mcpb --clobber; then
              break
            fi
            echo "::notice::.mcpb asset for $tag not ready (attempt $i/10); waiting 30s"
            sleep 30
          done
          # Hash exactly one .mcpb: fail loudly on zero (download never succeeded) or more than one
          # (ambiguous), rather than stamping a blank or concatenated fileSha256 into server.json.
          shopt -s nullglob
          mcpb_files=(_mcpb/*.mcpb)
          if [ "${#mcpb_files[@]}" -ne 1 ]; then
            echo "::error::expected exactly one .mcpb asset on $tag, found ${#mcpb_files[@]}"
            exit 1
          fi
          sha="$(sha256sum "${mcpb_files[0]}" | awk '{print $1}')"
          echo "Resolved $tag -> version $version, .mcpb sha256 $sha"
          jq --arg v "$version" --arg tag "$tag" --arg sha "$sha" '
            .version = $v
            | (.packages[] | select(.registryType == "pypi") | .version) = $v
            | (.packages[] | select(.registryType == "oci")  | .identifier)
                = "ghcr.io/gavinlucas/docker-mcp-server:\($v)"
            | (.packages[] | select(.registryType == "mcpb") | .identifier)
                = "https://github.com/GavinLucas/docker-mcp/releases/download/\($tag)/docker-mcp-server-\($v).mcpb"
            | (.packages[] | select(.registryType == "mcpb") | .fileSha256) = $sha
          ' server.json > server.tmp && mv server.tmp server.json
          echo "--- server.json ---"; cat server.json

      - name: Install mcp-publisher (pinned + checksum-verified)
        env:
          # Pin the publisher CLI rather than tracking releases/latest (supply-chain + reproducibility).
          # The runner is always ubuntu-latest (linux/amd64); SHA256 is mcp-publisher_linux_amd64.tar.gz
          # at this version. Re-pin VERSION and SHA256 together when bumping.
          MCP_PUBLISHER_VERSION: v1.7.9
          MCP_PUBLISHER_SHA256: ab128162b0616090b47cf245afe0a23f3ef08936fdce19074f5ba0a4469281ac
        run: |
          set -euo pipefail
          curl -fsSL "https://github.com/modelcontextprotocol/registry/releases/download/${MCP_PUBLISHER_VERSION}/mcp-publisher_linux_amd64.tar.gz" \
            -o mcp-publisher.tar.gz
          echo "${MCP_PUBLISHER_SHA256}  mcp-publisher.tar.gz" | sha256sum -c -
          tar xzf mcp-publisher.tar.gz mcp-publisher

      - name: Authenticate to the MCP Registry (GitHub OIDC)
        run: ./mcp-publisher login github-oidc

      - name: Publish server.json
        run: |
          set -uo pipefail
          # The artifacts the registry verifies (PyPI description, GHCR image label, .mcpb) are still
          # being published by the sibling workflows when this starts — the multi-arch image build is
          # the slowest — so retry long enough (20 x 60s = 20 min) to outlast it. Two failure classes,
          # checked propagation-first because the registry's "image does not exist" 400 ALSO contains
          # the words "validation failed":
          #   * propagation ("does not exist" / 404 / 429 / 5xx) -> keep waiting
          #   * deterministic (bad server.json field / namespace permission) -> fail fast, retry can't help
          attempts=20
          for i in $(seq 1 "$attempts"); do
            if out="$(./mcp-publisher publish 2>&1)"; then
              echo "$out"; echo "Published to the MCP Registry."; exit 0
            fi
            echo "$out"
            if printf '%s\n' "$out" | grep -qiE 'does not exist|not found|no such|status (404|429|5[0-9][0-9])'; then
              echo "::notice::a verified artifact isn't live yet (attempt $i/$attempts) — waiting 60s for propagation"
              sleep 60; continue
            fi
            if printf '%s\n' "$out" | grep -qiE 'status 4[0-9][0-9]|unprocessable|expected length|forbidden|permission'; then
              echo "::error::MCP Registry rejected the publish (not propagation) — fix server.json / namespace; a retry won't help."
              exit 1
            fi
            echo "::notice::publish attempt $i/$attempts failed; waiting 60s"
            sleep 60
          done
          echo "::error::MCP Registry publish failed after retries — re-run via workflow_dispatch once all release assets are live."
          exit 1
